name: CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "**/*.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # rust-cache saves the cache via a post-job step that runs even when
      # the job fails, so a failed clippy/test run still warms the cache for
      # the next push. It also caches ~/.cargo/bin so cargo-audit doesn't
      # get reinstalled on every run.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get install -y pkg-config libssl-dev

      - name: fmt
        run: cargo fmt --check

      # clippy compiles all deps and the crate (without cfg(test)) and acts as
      # the build step for everything that follows. cargo test then
      # only needs to recompile the crate itself with cfg(test) enabled rather
      # than recompiling all deps from scratch.
      - name: clippy
        run: cargo clippy -- -D warnings

      - name: test
        run: cargo test --locked

      - name: audit
        run: |
          cargo install cargo-audit --quiet
          cargo audit
